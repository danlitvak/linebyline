name: Release

# On a version tag (e.g. v1.0.0): build the app for Windows and macOS,
# then publish all artifacts to a single GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish LineByLine.App/LineByLine.App.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -o publish

      - name: Stage release artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item publish/LineByLine.App.exe "dist/LineByLine-${{ github.ref_name }}-win-x64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: dist/*.exe

  build-macos:
    name: Build macOS app (${{ matrix.rid }})
    runs-on: macos-latest
    strategy:
      matrix:
        rid: [osx-arm64, osx-x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish self-contained
        run: >
          dotnet publish LineByLine.App/LineByLine.App.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishSingleFile=false
          -o publish

      - name: Assemble .app bundle
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          APP="dist/Line by Line.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp -R publish/. "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/LineByLine.App"

          # Build a .icns icon from the PNG logo
          ICONSET="icon.iconset"
          mkdir -p "$ICONSET"
          SRC="LineByLine.App/Assets/lbl_logo.png"
          for s in 16 32 128 256 512; do
            sips -z "$s" "$s" "$SRC" --out "$ICONSET/icon_${s}x${s}.png" >/dev/null
            d=$((s * 2))
            sips -z "$d" "$d" "$SRC" --out "$ICONSET/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/AppIcon.icns"

          # Write Info.plist (flush-left: YAML strips the block indent)
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>CFBundleName</key><string>Line by Line</string>
          <key>CFBundleDisplayName</key><string>Line by Line</string>
          <key>CFBundleIdentifier</key><string>com.danlitvak.linebyline</string>
          <key>CFBundleExecutable</key><string>LineByLine.App</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleShortVersionString</key><string>${VERSION}</string>
          <key>CFBundleVersion</key><string>${VERSION}</string>
          <key>CFBundleIconFile</key><string>AppIcon</string>
          <key>LSMinimumSystemVersion</key><string>10.15</string>
          <key>NSHighResolutionCapable</key><true/>
          <key>LSApplicationCategoryType</key><string>public.app-category.productivity</string>
          </dict>
          </plist>
          PLIST

      - name: Zip .app bundle
        run: |
          set -euo pipefail
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Line by Line.app" \
            "LineByLine-${GITHUB_REF_NAME}-${{ matrix.rid }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: LineByLine-*.zip

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Line by Line ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
